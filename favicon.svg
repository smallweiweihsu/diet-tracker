<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4cd964"/>
      <stop offset="100%" stop-color="#1e9e3a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <!-- Progress ring track -->
  <circle cx="24" cy="23" r="13" stroke="rgba(255,255,255,0.28)" stroke-width="3" fill="none"/>
  <!-- Progress ring fill ~75% -->
  <circle cx="24" cy="23" r="13" stroke="white" stroke-width="3" fill="none"
    stroke-dasharray="61.26 81.68"
    stroke-linecap="round"
    transform="rotate(-90 24 23)"/>
  <!-- Fork (simplified): 3 tines + handle -->
  <line x1="21" y1="14" x2="21" y2="19" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="19" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="27" y1="14" x2="27" y2="19" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M21 19 Q24 22 24 24 L24 32" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
  <!-- Leaf accent (small, top-right inside ring) -->
  <ellipse cx="32" cy="15" rx="3.5" ry="2" fill="rgba(255,255,255,0.5)" transform="rotate(-40 32 15)"/>
  <line x1="28.8" y1="17.2" x2="32" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="0.8" stroke-linecap="round"/>
</svg>
