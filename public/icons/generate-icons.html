<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>點擊按鈕產生圖示，然後分別右鍵儲存</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c180" width="180" height="180"></canvas>
<br><br>
<button onclick="generate()">生成圖示</button>
<div id="links"></div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#10b981';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();
  // Fork and spoon emoji style
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.55}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍽', s/2, s/2);
}

function generate() {
  const sizes = [192, 512, 180];
  const names = ['icon-192x192.png', 'icon-512x512.png', 'apple-touch-icon.png'];
  const div = document.getElementById('links');
  div.innerHTML = '';
  sizes.forEach((s, i) => {
    const id = i === 2 ? 'c180' : `c${s}`;
    const canvas = document.getElementById(id);
    drawIcon(canvas);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = names[i];
    a.textContent = `下載 ${names[i]}`;
    a.style.display = 'block';
    a.style.margin = '8px 0';
    div.appendChild(a);
  });
}
</script>
</body>
</html>
