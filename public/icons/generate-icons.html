<!DOCTYPE html>
<html>
<head>
<title>DietTrack Icon Generator</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 24px; background: #f0f0f5; color: #1c1c1e; }
  h2 { margin-bottom: 6px; }
  p  { color: #6e6e73; margin-bottom: 18px; font-size: 14px; }
  .canvases { display: flex; gap: 16px; align-items: flex-end; margin: 20px 0; flex-wrap: wrap; }
  .canvas-wrap label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 500; }
  canvas { border-radius: 22%; box-shadow: 0 6px 24px rgba(0,0,0,0.22); display: block; }
  button { padding: 12px 32px; font-size: 15px; background: #0A9880; color: white;
    border: none; border-radius: 12px; cursor: pointer; font-weight: 600; letter-spacing: -0.2px; }
  #links { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  #links a { padding: 9px 18px; background: white; border-radius: 10px; color: #1c1c1e;
    text-decoration: none; font-size: 13px; font-weight: 500;
    box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
</style>
</head>
<body>
<h2>DietTrack Icon Generator</h2>
<p>點擊生成後，下載三個 PNG 並覆蓋 <code>public/icons/</code> 內的舊檔，再 commit push。</p>

<div class="canvases">
  <div class="canvas-wrap"><label>192 × 192</label>
    <canvas id="c192" width="192" height="192"></canvas></div>
  <div class="canvas-wrap"><label>512 × 512（縮小顯示）</label>
    <canvas id="c512" width="512" height="512" style="width:192px;height:192px"></canvas></div>
  <div class="canvas-wrap"><label>180 × 180 (Apple Touch)</label>
    <canvas id="c180" width="180" height="180"></canvas></div>
</div>

<button onclick="generate()">生成並下載圖示</button>
<div id="links"></div>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s   = canvas.width;
  const sc  = s / 512;

  // ── 1. Background (clipped) ────────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.225);
  ctx.clip();

  // Deep teal gradient
  const bg = ctx.createLinearGradient(0, 0, s * 0.6, s);
  bg.addColorStop(0,    '#15A392');
  bg.addColorStop(0.55, '#0A6B60');
  bg.addColorStop(1,    '#043030');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, s, s);

  // Glossy top highlight
  const gloss = ctx.createRadialGradient(s * 0.5, 0, 0, s * 0.5, s * 0.5, s * 0.72);
  gloss.addColorStop(0,    'rgba(255,255,255,0.30)');
  gloss.addColorStop(0.35, 'rgba(255,255,255,0.07)');
  gloss.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = gloss;
  ctx.fillRect(0, 0, s, s);

  // Subtle dark vignette at bottom
  const vig = ctx.createRadialGradient(s*0.5, s*0.5, s*0.3, s*0.5, s*0.5, s*0.72);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.16)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, s, s);

  ctx.restore();

  // ── 2. Fork tines ──────────────────────────────────────────────────────
  const tineXs  = [230 * sc, 256 * sc, 282 * sc];
  const tineTop = 62  * sc;
  const tineBot = 202 * sc;
  const tineW   = 15  * sc;

  ctx.shadowColor  = 'rgba(255,255,255,0.45)';
  ctx.shadowBlur   = 9 * sc;
  ctx.strokeStyle  = 'rgba(255,255,255,0.97)';
  ctx.lineWidth    = tineW;
  ctx.lineCap      = 'round';

  for (const tx of tineXs) {
    ctx.beginPath();
    ctx.moveTo(tx, tineTop);
    ctx.lineTo(tx, tineBot);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // ── 3. Leaf body ───────────────────────────────────────────────────────
  const lx   = 256 * sc;
  const ltop = 188 * sc;   // connects to tine base (slight overlap)
  const lbot = 450 * sc;   // leaf tip / handle end
  const lw   = 116 * sc;   // half-width at widest

  ctx.shadowColor   = 'rgba(2,30,30,0.28)';
  ctx.shadowBlur    = 18 * sc;
  ctx.shadowOffsetY = 7  * sc;

  ctx.fillStyle = 'rgba(255,255,255,0.97)';
  ctx.beginPath();
  ctx.moveTo(lx, ltop);
  // Right side: shoulder out, then taper to bottom point
  ctx.bezierCurveTo(
    lx + lw * 0.85, ltop + (lbot - ltop) * 0.20,
    lx + lw,        ltop + (lbot - ltop) * 0.50,
    lx,             lbot
  );
  // Left side (mirror)
  ctx.bezierCurveTo(
    lx - lw,        ltop + (lbot - ltop) * 0.50,
    lx - lw * 0.85, ltop + (lbot - ltop) * 0.20,
    lx,             ltop
  );
  ctx.fill();

  ctx.shadowBlur    = 0;
  ctx.shadowOffsetY = 0;

  // ── 4. Midrib (teal, creates fork-handle + leaf-vein visual) ──────────
  ctx.strokeStyle = 'rgba(4,48,48,0.42)';
  ctx.lineWidth   = 8 * sc;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(lx, ltop + 8  * sc);
  ctx.lineTo(lx, lbot - 10 * sc);
  ctx.stroke();

  // ── 5. Leaf veins (3 pairs) ────────────────────────────────────────────
  ctx.lineWidth   = 5 * sc;
  ctx.strokeStyle = 'rgba(4,48,48,0.22)';
  const lh   = lbot - ltop;
  const veins = [
    { fy: 0.24, fw: 0.72 },
    { fy: 0.46, fw: 0.88 },
    { fy: 0.64, fw: 0.64 },
  ];

  for (const v of veins) {
    const vy = ltop + v.fy * lh;
    const vx = lw   * v.fw;
    // right vein
    ctx.beginPath();
    ctx.moveTo(lx, vy);
    ctx.quadraticCurveTo(lx + vx * 0.55, vy - lh * 0.04, lx + vx, vy + lh * 0.02);
    ctx.stroke();
    // left vein (mirror)
    ctx.beginPath();
    ctx.moveTo(lx, vy);
    ctx.quadraticCurveTo(lx - vx * 0.55, vy - lh * 0.04, lx - vx, vy + lh * 0.02);
    ctx.stroke();
  }
}

function generate() {
  const configs = [
    { id: 'c192', name: 'icon-192x192.png'    },
    { id: 'c512', name: 'icon-512x512.png'    },
    { id: 'c180', name: 'apple-touch-icon.png' },
  ];
  const div = document.getElementById('links');
  div.innerHTML = '';

  for (const { id, name } of configs) {
    const canvas = document.getElementById(id);
    drawIcon(canvas);
    const a = document.createElement('a');
    a.href      = canvas.toDataURL('image/png');
    a.download  = name;
    a.textContent = `⬇ ${name}`;
    div.appendChild(a);
  }
}

// Auto-preview on load
window.addEventListener('load', generate);
</script>
</body>
</html>
