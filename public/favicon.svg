<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".6" y2="1">
      <stop offset="0%"   stop-color="#15A392"/>
      <stop offset="55%"  stop-color="#0A6B60"/>
      <stop offset="100%" stop-color="#043030"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="0%" r="72%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="38%"  stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="rr">
      <rect width="48" height="48" rx="10.8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#rr)">
    <rect width="48" height="48" fill="url(#bg)"/>
    <rect width="48" height="48" fill="url(#gloss)"/>
  </g>

  <!-- Fork tines (3) — emerging from leaf top -->
  <line x1="20.5" y1="7"  x2="20.5" y2="20" stroke="rgba(255,255,255,0.96)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="24"   y1="6"  x2="24"   y2="20" stroke="rgba(255,255,255,0.96)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="27.5" y1="7"  x2="27.5" y2="20" stroke="rgba(255,255,255,0.96)" stroke-width="1.9" stroke-linecap="round"/>

  <!-- Leaf body -->
  <path d="M24 19 C31.5 22.5 34 29 24 43 C14 29 16.5 22.5 24 19Z"
        fill="rgba(255,255,255,0.97)"/>

  <!-- Leaf midrib -->
  <line x1="24" y1="20" x2="24" y2="42"
        stroke="rgba(4,48,48,0.38)" stroke-width="1.0" stroke-linecap="round"/>

  <!-- Leaf veins -->
  <path d="M24 26.5 Q27.5 25.8 29.2 26.8" stroke="rgba(4,48,48,0.24)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M24 26.5 Q20.5 25.8 18.8 26.8" stroke="rgba(4,48,48,0.24)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M24 31.5 Q28.8 30.4 30.8 31.6" stroke="rgba(4,48,48,0.24)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M24 31.5 Q19.2 30.4 17.2 31.6" stroke="rgba(4,48,48,0.24)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M24 36.5 Q27.5 35.6 28.8 36.4" stroke="rgba(4,48,48,0.20)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M24 36.5 Q20.5 35.6 19.2 36.4" stroke="rgba(4,48,48,0.20)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
</svg>
