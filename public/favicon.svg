<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".65" y2="1">
      <stop offset="0%"   stop-color="#43E07A"/>
      <stop offset="50%"  stop-color="#1BBD4C"/>
      <stop offset="100%" stop-color="#0A6628"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="0%" r="75%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="rr">
      <rect width="48" height="48" rx="10.8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rr)">
    <rect width="48" height="48" fill="url(#bg)"/>
    <rect width="48" height="48" fill="url(#gloss)"/>
  </g>
  <!-- Progress arc track (280°, centered bottom gap) -->
  <circle cx="24" cy="24" r="16.5" fill="none"
    stroke="rgba(255,255,255,0.22)" stroke-width="1.3"
    stroke-dasharray="81.8 104.0"
    stroke-dashoffset="-11.1"
    stroke-linecap="round"/>
  <!-- Progress arc fill (78%) -->
  <circle cx="24" cy="24" r="16.5" fill="none"
    stroke="rgba(255,255,255,0.88)" stroke-width="1.3"
    stroke-dasharray="63.8 104.0"
    stroke-dashoffset="-11.1"
    stroke-linecap="round"/>
  <!-- Leaf body -->
  <path d="M24 8.5 C30.4 11.5 33 17 24 31 C15 17 17.6 11.5 24 8.5Z" fill="white" opacity="0.97"/>
  <!-- Leaf midrib -->
  <line x1="24" y1="9.5" x2="24" y2="30" stroke="rgba(10,80,32,0.40)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Leaf veins -->
  <path d="M24 16 Q27.5 15.4 28.8 16.2" stroke="rgba(10,80,32,0.28)" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <path d="M24 16 Q20.5 15.4 19.2 16.2" stroke="rgba(10,80,32,0.28)" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <path d="M24 20.5 Q28.5 19.6 30 20.6" stroke="rgba(10,80,32,0.28)" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <path d="M24 20.5 Q19.5 19.6 18 20.6" stroke="rgba(10,80,32,0.28)" stroke-width="0.6" stroke-linecap="round" fill="none"/>
</svg>
